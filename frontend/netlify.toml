[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://clueless-eira.onrender.com/api/:splat"
  status = 200
  force = true

[env.production]
  [env.production.context.production.environment]
    VITE_API_URL = "https://clueless-eira.onrender.com/api"
    VITE_SOCKET_URL = "https://clueless-eira.onrender.com"